<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث المباشر</title>
    <style>
        /* تحويل الصفحة لمشغل فقط بدون هوامش */
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; /* بياخد طول الشاشة كلها */
            overflow: hidden; /* بيمنع ظهور سكرول للصفحة كلها */
        }

        /* شريط التحكم العلوي للمشغل */
        .player-header {
            background-color: #111;
            border-bottom: 2px solid #222;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        /* تصغير الزراير عشان تناسب شريط المشغل */
        .admin-btn {
            background-color: #f39c12;
            color: #000;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .adblock-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .adblock-btn.disabled { background-color: #c0392b; }

        /* أزرار التنقل السابقة والتالية */
        .nav-btn {
            background-color: #8e44ad;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .nav-btn:hover { background-color: #732d91; }

        /* شريط القنوات قابل للتمرير لو القنوات كترت */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
            scroll-behavior: smooth; /* عشان السكرول يكون ناعم */
        }
        
        /* تجميل شكل السكرول بار بتاع القنوات */
        .tabs-container::-webkit-scrollbar { height: 6px; }
        .tabs-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .tab-btn {
            background-color: #008b8b;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            flex-shrink: 0; /* بيمنع الزرار يكش */
        }

        .tab-btn.active {
            background-color: #004d4d;
            border: 1px solid #fff;
        }

        .tab-btn.hd { background-color: #b22222; }

        /* تعديل الفيديو عشان يملى باقي المساحة */
        .video-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1; /* بياخد كل المساحة المتبقية من الشاشة */
            background-color: #000;
        }

        .close-vid-btn {
            position: absolute;
            top: 10px;
            left: 10px; 
            background-color: rgba(255, 0, 0, 0.8);
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            display: none; 
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .close-vid-btn:hover { background-color: red; transform: scale(1.1); }

        .external-vid-btn {
            position: absolute;
            top: 10px;
            right: 10px; 
            background-color: rgba(41, 128, 185, 0.8); 
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            display: none; 
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .external-vid-btn:hover { background-color: #2980b9; transform: scale(1.1); }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* لوحة التعديل زي ما هي */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #444;
            color: white;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px;}
        .form-group input, .form-group select {
            width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #555;
            background-color: #333; color: white; box-sizing: border-box;
        }

        .modal-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        
        .save-btn { background-color: #27ae60; } 
        .close-btn { background-color: #7f8c8d; } 
        
        .export-section {
            border-top: 1px solid #444;
            padding-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-channel-btn { background-color: #d35400; color: white; width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .download-btn { background-color: #2980b9; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .copy-btn { background-color: #8e44ad; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>

    <div id="settingsModal" class="modal" style="display: none;">

            <h3 style="margin-top:0">إعدادات البث المباشر</h3>
            
            <div class="form-group">
                <label>اختار الزرار للتعديل:</label>
                <select id="buttonSelect" onchange="loadButtonData()" data-ddg-inputtype="unknown">

                <input type="text" id="editLink" data-ddg-inputtype="unknown">

                <button class="action-btn save-btn" onclick="applyChanges()">تطبيق التعديل</button>
                <button class="action-btn close-btn" onclick="closeModal()">إغلاق اللوحة</button>

    <script>
        // دالة مانع الإعلانات
        let adblockEnabled = true;
        function toggleAdBlock() {
            let iframe = document.getElementById('videoPlayer');
            let btn = document.getElementById('adblockBtn');
            adblockEnabled = !adblockEnabled;
            
            if (adblockEnabled) {
                iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
                btn.innerText = '🛡️ المانع (شغال)';
                btn.classList.remove('disabled');
            } else {
                iframe.removeAttribute('sandbox');
                btn.innerText = '🛡️ المانع (مقفول)';
                btn.classList.add('disabled');
            }
            
            let currentSrc = iframe.src;
            if(currentSrc && currentSrc !== window.location.href) {
                iframe.src = currentSrc;
            }
        }

        // تشغيل البث
        function playStream(btnElement) {
            let link = btnElement.getAttribute('data-link');
            document.getElementById('videoPlayer').src = link;
            
            document.getElementById('closeVid').style.display = 'flex';
            document.getElementById('externalVid').style.display = 'flex';

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }

        // إغلاق المشغل
        function closePlayer() {
            document.getElementById('videoPlayer').src = "";
            document.getElementById('closeVid').style.display = 'none';
            document.getElementById('externalVid').style.display = 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        // الفتح الخارجي
        function openExternal() {
            let currentLink = document.getElementById('videoPlayer').src;
            if (currentLink && currentLink.trim() !== "" && currentLink !== window.location.href) {
                window.open(currentLink, '_blank'); 
            } else {
                alert("مفيش بث شغال حالياً عشان نفتحه!");
            }
        }

        function openModal() {
            document.getElementById('settingsModal').style.display = 'flex';
            loadButtonData();
        }

        function closeModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function loadButtonData() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            if(btn) {
                document.getElementById('editName').value = btn.innerText;
                document.getElementById('editLink').value = btn.getAttribute('data-link');
            }
        }

        function applyChanges() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            let name = document.getElementById('editName').value;
            let link = document.getElementById('editLink').value;

            btn.innerText = name;
            btn.setAttribute('data-link', link);
            
            let opt = document.querySelector(`#buttonSelect option[value="${id}"]`);
            if(opt) opt.innerText = name;

            if (btn.classList.contains('active')) playStream(btn);
            alert("تم تطبيق التعديل بنجاح!");
        }

        function addNewChannel() {
            let channelName = prompt("اكتب اسم القناة أو البث الجديد:");
            if (!channelName || channelName.trim() === "") return;

            let channelLink = prompt("اكتب لينك البث (الرابط):");
            if (!channelLink) channelLink = "";

            let newId = "btn_new_" + new Date().getTime();

            let newBtn = document.createElement("button");
            newBtn.id = newId;
            newBtn.className = "tab-btn";
            newBtn.setAttribute("data-link", channelLink);
            newBtn.innerText = channelName;
            newBtn.setAttribute("onclick", "playStream(this)");

            document.getElementById("mainTabs").appendChild(newBtn);

            let newOption = document.createElement("option");
            newOption.value = newId;
            newOption.innerText = channelName;
            document.getElementById("buttonSelect").appendChild(newOption);

            document.getElementById("buttonSelect").value = newId;
            loadButtonData();

            alert("تم إضافة القناة بنجاح!");
        }

        function downloadFullFile() {
            closeModal(); 
            setTimeout(() => {
                let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
                let blob = new Blob([content], { type: 'text/html' });
                let a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'my_player.html';
                a.click();
            }, 100);
        }

        function copyFullCode() {
            closeModal();
            setTimeout(() => {
                let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
                navigator.clipboard.writeText(content).then(() => {
                    alert("تم نسخ الكود بالكامل!");
                });
            }, 100);
        }

        // تشغيل السيرفر التالي
        function playNextStream() {
            let activeBtn = document.querySelector('.tab-btn.active');
            let nextBtn;
            if (activeBtn) {
                nextBtn = activeBtn.nextElementSibling;
            } else {
                nextBtn = document.querySelector('.tab-btn'); // لو مفيش حاجة شغالة، يشغل الأول
            }
            
            if (nextBtn && nextBtn.classList.contains('tab-btn')) {
                playStream(nextBtn);
                nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            } else if (activeBtn) {
                // لو وصلنا للآخر نرجع للأول
                let firstBtn = document.querySelector('.tab-btn');
                if(firstBtn) {
                    playStream(firstBtn);
                    firstBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }
        }

        // تشغيل السيرفر السابق
        function playPrevStream() {
            let activeBtn = document.querySelector('.tab-btn.active');
            let prevBtn;
            if (activeBtn) {
                prevBtn = activeBtn.previousElementSibling;
            } else {
                let allBtns = document.querySelectorAll('.tab-btn');
                if(allBtns.length > 0) prevBtn = allBtns[allBtns.length - 1]; // لو مفيش حاجة شغالة، يشغل الأخير
            }
            
            if (prevBtn && prevBtn.classList.contains('tab-btn')) {
                playStream(prevBtn);
                prevBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            } else if (activeBtn) {
                // لو وصلنا للأول نروح للآخر
                let allBtns = document.querySelectorAll('.tab-btn');
                if(allBtns.length > 0) {
                    let lastBtn = allBtns[allBtns.length - 1];
                    playStream(lastBtn);
                    lastBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }
        }
    </script>

</body></html>
