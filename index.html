<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث المباشر</title>
    <style>
        /* تحويل الصفحة لمشغل فقط بدون هوامش */
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط التحكم العلوي للمشغل */
        .player-header {
            background-color: #111;
            border-bottom: 2px solid #222;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .admin-btn {
            background-color: #f39c12;
            color: #000;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap; /* عشان لو الشاشة صغيرة ينزلوا سطر جديد شيك */
        }

        /* توحيد كل زراير التحكم العلوية */
        .nav-btn, .rotate-btn, .adblock-btn, .close-top-btn, .external-top-btn {
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        /* ألوان الزراير المتخصصة */
        .nav-btn { background-color: #3498db; }
        .nav-btn:hover { background-color: #2980b9; }

        .rotate-btn { background-color: #9b59b6; }
        .rotate-btn:hover { background-color: #8e44ad; }

        .close-top-btn { background-color: #c0392b; }
        .close-top-btn:hover { background-color: #e74c3c; }

        .external-top-btn { background-color: #8e44ad; }
        .external-top-btn:hover { background-color: #9b59b6; }

        .adblock-btn { background-color: #27ae60; }
        .adblock-btn.disabled { background-color: #c0392b; }

        /* شريط القنوات قابل للتمرير */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
        }
        
        .tabs-container::-webkit-scrollbar { height: 6px; }
        .tabs-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .tab-btn {
            background-color: #008b8b;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .tab-btn.active {
            background-color: #004d4d;
            border: 1px solid #fff;
        }

        /* تعديل الفيديو */
        .video-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1;
            background-color: #000;
        }

        .video-wrapper.rotated iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: calc(100vh - 75px);
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* لوحة التعديل */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #444;
            color: white;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px;}
        .form-group input, .form-group select {
            width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #555;
            background-color: #333; color: white; box-sizing: border-box;
        }

        .modal-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        
        .save-btn { background-color: #27ae60; } 
        .delete-btn { background-color: #e74c3c; } /* الإضافة: لون زر الحذف */
        .close-btn { background-color: #7f8c8d; } 
        
        .export-section {
            border-top: 1px solid #444;
            padding-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-channel-btn { background-color: #d35400; color: white; width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .download-btn { background-color: #2980b9; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .copy-btn { background-color: #8e44ad; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>

            <h3 style="margin-top:0">إعدادات البث المباشر</h3>
            
            <div class="form-group">
                <label>اختار الزرار للتعديل أو الحذف:</label>
                <select id="buttonSelect" onchange="loadButtonData()" data-ddg-inputtype="unknown"><option value="btn1">ALWAN 1</option><option value="btn2">ALWAN 2</option><option value="btn3">ALWAN 3</option><option value="btn4">ALWAN 4</option><option value="btn5">ALWAN 5</option><option value="btn6">ALWAN 6</option><option value="btn7">ALWAN 7</option><option value="btn8">ALWAN 8</option><option value="btn9">ALWAN 9</option><option value="btn10">ALWAN 10</option><option value="btn11">ALWAN 11</option><option value="btn12">ALWAN 12</option><option value="btn_new_1775361376263">1</option><option value="btn_new_1775361411665">2</option><option value="btn_new_1775361434207">3</option><option value="btn_new_1775361465197">3</option><option value="btn_new_1775665722230">4</option></select>

                <input type="text" id="editLink" data-ddg-inputtype="unknown">

            <div class="modal-buttons">
                <button class="action-btn save-btn" onclick="applyChanges()">تطبيق التعديل</button>
                <button class="action-btn delete-btn" onclick="deleteChannel()">حذف القناة</button>
                <button class="action-btn close-btn" onclick="closeModal()">إغلاق</button>

                <button class="download-btn" onclick="downloadFullFile()">💾 حفظ الملف</button>

    <script>
        // سحب أسامي الزراير لقائمة التعديل
        function populateSelectMenu() {
            const selectMenu = document.getElementById('buttonSelect');
            selectMenu.innerHTML = ''; 
            document.querySelectorAll('#mainTabs .tab-btn').forEach(btn => {
                selectMenu.innerHTML += `<option value="${btn.id}">${btn.innerText}</option>`;
            });
        }
        populateSelectMenu();

        // تشغيل القناة الأولى بمجرد فتح الصفحة (عشان كل الزراير تتفعل صح)
        window.onload = function() {
            playStream(document.getElementById('btn1'));
        };

        let adblockEnabled = true;
        function toggleAdBlock() {
            let iframe = document.getElementById('videoPlayer');
            let btn = document.getElementById('adblockBtn');
            adblockEnabled = !adblockEnabled;
            
            if (adblockEnabled) {
                iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
                btn.innerText = '🛡️ المانع (شغال)';
                btn.classList.remove('disabled');
            } else {
                iframe.removeAttribute('sandbox');
                btn.innerText = '🛡️ المانع (مقفول)';
                btn.classList.add('disabled');
            }
            
            let currentSrc = iframe.src;
            if(currentSrc && currentSrc !== window.location.href) {
                iframe.src = currentSrc;
            }
        }

        // تشغيل البث
        function playStream(btnElement) {
            let link = btnElement.getAttribute('data-link');
            document.getElementById('videoPlayer').src = link;
            
            // إظهار زراير الإغلاق والفتح الخارجي في الشريط العلوي كعنصر inline-block
            document.getElementById('closeVid').style.display = 'inline-block';
            document.getElementById('externalVid').style.display = 'inline-block';

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }

        // إغلاق المشغل
        function closePlayer() {
            document.getElementById('videoPlayer').src = "";
            document.getElementById('closeVid').style.display = 'none';
            document.getElementById('externalVid').style.display = 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        // الفتح الخارجي
        function openExternal() {
            let currentLink = document.getElementById('videoPlayer').src;
            if (currentLink && currentLink.trim() !== "" && currentLink !== window.location.href) {
                window.open(currentLink, '_blank'); 
            } else {
                alert("مفيش بث شغال حالياً عشان نفتحه!");
            }
        }

        function openModal() {
            populateSelectMenu(); 
            document.getElementById('settingsModal').style.display = 'flex';
            loadButtonData();
        }

        function closeModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function loadButtonData() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            if(btn) {
                document.getElementById('editName').value = btn.innerText;
                document.getElementById('editLink').value = btn.getAttribute('data-link');
            }
        }

        function applyChanges() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            let name = document.getElementById('editName').value;
            let link = document.getElementById('editLink').value;

            btn.innerText = name;
            btn.setAttribute('data-link', link);
            
            let opt = document.querySelector(`#buttonSelect option[value="${id}"]`);
            if(opt) opt.innerText = name;

            if (btn.classList.contains('active')) playStream(btn);
            alert("تم تطبيق التعديل بنجاح!");
        }

        // الإضافة: دالة حذف القناة المحددة
        function deleteChannel() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            
            if(btn) {
                let confirmAction = confirm("متأكد إنك عايز تحذف القناة دي؟");
                if(confirmAction) {
                    // لو القناة اللي بتتحذف هي اللي شغالة، نقفل المشغل
                    if(btn.classList.contains('active')) {
                        closePlayer();
                    }
                    
                    // نحذف الزرار من الشريط
                    btn.remove();
                    
                    // نحدث القائمة المنسدلة
                    populateSelectMenu();
                    loadButtonData();
                    
                    alert("تم حذف القناة بنجاح!");
                }
            }
        }

        function addNewChannel() {
            let channelName = prompt("اكتب اسم القناة أو البث الجديد:");
            if (!channelName || channelName.trim() === "") return;

            let channelLink = prompt("اكتب لينك البث (الرابط):");
            if (!channelLink) channelLink = "";

            let newId = "btn_new_" + new Date().getTime();

            let newBtn = document.createElement("button");
            newBtn.id = newId;
            newBtn.className = "tab-btn";
            newBtn.setAttribute("data-link", channelLink);
            newBtn.innerText = channelName;
            newBtn.setAttribute("onclick", "playStream(this)");

            document.getElementById("mainTabs").appendChild(newBtn);

            populateSelectMenu();
            document.getElementById("buttonSelect").value = newId;
            loadButtonData();

            alert("تم إضافة القناة بنجاح!");
        }

        function downloadFullFile() {
            closeModal(); 
            setTimeout(() => {
                let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
                let blob = new Blob([content], { type: 'text/html' });
                let a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'my_player.html';
                a.click();
            }, 100);
        }

        function copyFullCode() {
            closeModal();
            setTimeout(() => {
                let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
                navigator.clipboard.writeText(content).then(() => {
                    alert("تم نسخ الكود بالكامل!");
                });
            }, 100);
        }

        // دالة الانتقال للسيرفر التالي
        function nextStream() {
            let tabs = Array.from(document.querySelectorAll('#mainTabs .tab-btn'));
            if (tabs.length === 0) return;

            let activeIndex = tabs.findIndex(btn => btn.classList.contains('active'));
            let nextIndex = (activeIndex + 1) % tabs.length; 
            
            playStream(tabs[nextIndex]);
            tabs[nextIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        // دالة الانتقال للسيرفر السابق
        function prevStream() {
            let tabs = Array.from(document.querySelectorAll('#mainTabs .tab-btn'));
            if (tabs.length === 0) return;

            let activeIndex = tabs.findIndex(btn => btn.classList.contains('active'));
            if (activeIndex === -1) activeIndex = 0;

            let prevIndex = (activeIndex - 1 + tabs.length) % tabs.length; 
            
            playStream(tabs[prevIndex]);
            tabs[prevIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        // دالة تدوير الشاشة
        function toggleRotation() {
            let videoWrapper = document.querySelector('.video-wrapper');
            videoWrapper.classList.toggle('rotated');
        }
    </script>
